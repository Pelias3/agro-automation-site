name: Generate Key
on: workflow_dispatch
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - run: ssh-keygen -t rsa -b 4096 -f ./id_rsa -N ""
      - run: echo "--- PRIVATE KEY (Вставь в секрет SSH_KEY) ---" && cat ./id_rsa
      - run: echo "--- PUBLIC KEY (Вставь в Sweb в файл .ssh/authorized_keys) ---" && cat ./id_rsa.pub
