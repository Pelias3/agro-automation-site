name: Deploy to Sweb
on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Обновили до v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2 # Обновили до v2
        with:
          bun-version: latest

      - name: Install and Build
        run: |
          bun install
          bun run build

      - name: Deploy to Server via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: 2222
          source: "dist/*" # Для Vite/Bun почти всегда dist. Если не сработает — проверь package.json
          target: "agroautomation.online/public_html/" # Указываем путь точнее
          strip_components: 1
