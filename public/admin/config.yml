backend:
  name: github
  repo: Pelias3/agro-automation-site # Путь к репозиторию на GitHub
  branch: main
  base_url: https://netlify-cms-github-oauth-provider-lilac.vercel.app/

media_folder: "public/assets/blog" # куда сохранять картинки
public_folder: "/assets/blog"

collections:
  - name: "blog"
    label: "Блог"
    folder: "src/content/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Заголовок", name: "title", widget: "string" }
      - { label: "Дата", name: "date", widget: "datetime" }
      - { label: "Обложка", name: "image", widget: "image" }
      - { label: "Описание (SEO)", name: "description", widget: "text" }
      - { label: "Текст поста", name: "body", widget: "markdown" }